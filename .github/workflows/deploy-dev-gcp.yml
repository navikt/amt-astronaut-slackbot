name: Deploy to dev-gcp

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to dev-gcp
    runs-on: ubuntu-latest
    environment: dev-gcp
    concurrency:
      group: deploy-dev-gcp
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and push container image
        id: image
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c # v0
        with:
          team: amt
          dockerfile: Dockerfile
          tag: ${{ github.sha }}

      - name: Deploy to dev-gcp
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2 # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml
          VAR: image=${{ steps.image.outputs.image }}
