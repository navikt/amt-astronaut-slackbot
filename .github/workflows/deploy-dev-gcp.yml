name: Deploy to dev-gcp

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to dev-gcp
    runs-on: ubuntu-latest
    environment: dev-gcp
    concurrency:
      group: deploy-dev-gcp
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push container image
        id: image
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: amt
          dockerfile: Dockerfile
          tag: ${{ github.sha }}

      - name: Deploy to dev-gcp
        uses: nais/deploy/actions/deploy@1b32d71ce5c97174c039ac739b10220dab5a001f # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml
          VAR: image=${{ steps.image.outputs.image }}
